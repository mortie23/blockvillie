<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Map Array Editor</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; margin: 0; }
    .container { display: flex; flex-direction: column; height: calc(100vh - 40px); gap: 15px; }
    .top-panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .main-workspace { display: flex; gap: 15px; flex: 1; min-height: 0; }
    
    .sidebar { width: 350px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
    .canvas-wrapper { flex: 1; background: #e0e0e0; border-radius: 8px; overflow: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1) inset; position: relative; border: 2px solid #ccc; }
    
    h2, h3 { color: #4ecdc4; margin-top: 0; margin-bottom: 10px; }
    
    .palette { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .color-btn { display: flex; align-items: center; gap: 10px; padding: 8px; border: 2px solid transparent; border-radius: 6px; background: #f8f9fa; cursor: pointer; text-align: left; font-size: 14px; transition: 0.2s; }
    .color-btn:hover { background: #e9ecef; }
    .color-btn.active { border-color: #4ecdc4; background: #e8f8f5; font-weight: bold; }
    .swatch { width: 24px; height: 24px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.2); box-sizing: border-box; }
    
    canvas { background: white; display: block; image-rendering: pixelated; touch-action: none; }
    
    textarea { width: 100%; height: 180px; font-family: monospace; font-size: 12px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: none; white-space: pre; }
    
    .btn { background: #4ecdc4; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; }
    .btn:hover { background: #3dbbb2; }
    .btn.secondary { background: #95a5a6; }
    .btn.secondary:hover { background: #7f8c8d; }
    .btn.export { background: #ff9f1c; margin-top: 10px; width: 100%; }
    .btn.export:hover { background: #f09218; }
    
    .control-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 15px; }
    input[type="number"] { width: 60px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
    
    .status { font-size: 12px; color: #666; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-panel">
      <div class="control-row">
        <h2>🗺️ Blockvillie Map Editor</h2>
      </div>
      <div class="control-row">
        <strong>Create Blanks:</strong>
        <label>W:</label> <input type="number" id="newW" value="50" min="5" max="500">
        <label>H:</label> <input type="number" id="newH" value="50" min="5" max="500">
        <button class="btn secondary" id="btnCreateBlank">Create Blank Map</button>
        
        <span style="margin: 0 15px; color: #ccc;">|</span>
        
        <strong>Zoom:</strong>
        <input type="range" id="zoomCtrl" min="4" max="32" value="16"> <span id="zoomLabel">16px</span>
        
        <span style="margin: 0 15px; color: #ccc;">|</span>
        <span class="status" id="statusMessage">Tip: Click and drag on the canvas to paint tiles.</span>
      </div>
    </div>

    <div class="main-workspace">
      <div class="sidebar">
        <div>
          <h3>1. Tile Palette</h3>
          <div class="palette" id="palette"></div>
        </div>
        
        <div style="flex: 1;">
          <h3>2. Array Data (I/O)</h3>
          <textarea id="ioBox" placeholder="Paste your map array here to load it...&#10;[&#10;  [0, 1, 0],&#10;  [0, 0, 0]&#10;]"></textarea>
          <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn" id="btnLoad" style="flex: 1;">Load from Text</button>
          </div>
          <button class="btn export" id="btnExport">Export Array (Update Text)</button>
        </div>
      </div>
      
      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="mapCanvas"></canvas>
      </div>
    </div>
  </div>

  <script>
    const TILE_COLORS = {
      0: { color: '#88d49e', name: '0: Grass (Walkable)' },
      1: { color: '#bc6c25', name: '1: Wall (Unwalkable)' },
      2: { color: '#1a1a1a', name: '2: Out of Bounds' },
      3: { color: '#fefae0', name: '3: Indoor Floor' },
      4: { color: '#c8956c', name: '4: Outdoor Paved' },
      5: { color: '#e9c46a', name: '5: Sand Pit' },
      6: { color: '#333333', name: '6: Bitumen/Tar' },
      7: { color: '#7f8c8d', name: '7: Fence (Unwalkable)' },
      8: { color: '#8b4513', name: '8: Tan Bark' }
    };

    let mapData = []; // 2D array [y][x]
    let mapW = 0;
    let mapH = 0;
    let tileSize = 16;
    let selectedTile = 0;
    
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const paletteDiv = document.getElementById('palette');
    const ioBox = document.getElementById('ioBox');
    const statusMsg = document.getElementById('statusMessage');

    // 1. Initialize Palette
    Object.keys(TILE_COLORS).forEach(id => {
      const btn = document.createElement('button');
      btn.className = `color-btn ${selectedTile == id ? 'active' : ''}`;
      btn.innerHTML = `<div class="swatch" style="background:${TILE_COLORS[id].color}"></div> <span>${TILE_COLORS[id].name}</span>`;
      btn.onclick = () => {
        selectedTile = parseInt(id, 10);
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      };
      paletteDiv.appendChild(btn);
    });

    // 2. Render Canvas
    function renderMap() {
      if (!mapData || !mapData.length) return;
      
      canvas.width = mapW * tileSize;
      canvas.height = mapH * tileSize;
      
      // Clear
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw grid lines optional, but blocks are better
      for (let y = 0; y < mapH; y++) {
        for (let x = 0; x < mapW; x++) {
          const tileId = mapData[y][x];
          const colorObj = TILE_COLORS[tileId];
          ctx.fillStyle = colorObj ? colorObj.color : '#ff00ff'; // magenta for unknown
          ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
        }
      }
      
      // Draw grid
      if (tileSize >= 8) {
        ctx.strokeStyle = 'rgba(0,0,0,0.1)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let x = 0; x <= mapW; x++) { ctx.moveTo(x * tileSize, 0); ctx.lineTo(x * tileSize, canvas.height); }
        for (let y = 0; y <= mapH; y++) { ctx.moveTo(0, y * tileSize); ctx.lineTo(canvas.width, y * tileSize); }
        ctx.stroke();
      }
    }

    // 3. Interaction Logic
    let isPainting = false;
    
    function getTileCoords(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = Math.floor(((e.clientX - rect.left) * scaleX) / tileSize);
      const y = Math.floor(((e.clientY - rect.top) * scaleY) / tileSize);
      return { x, y };
    }

    function paint(e) {
      const { x, y } = getTileCoords(e);
      if (x >= 0 && x < mapW && y >= 0 && y < mapH) {
        if (mapData[y][x] !== selectedTile) {
          mapData[y][x] = selectedTile;
          
          // efficient redraw of single tile
          ctx.fillStyle = TILE_COLORS[selectedTile].color;
          ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
          if (tileSize >= 8) {
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.strokeRect(x * tileSize, y * tileSize, tileSize, tileSize);
          }
        }
      }
    }

    canvas.addEventListener('mousedown', (e) => { isPainting = true; paint(e); });
    canvas.addEventListener('mousemove', (e) => { if (isPainting) paint(e); });
    window.addEventListener('mouseup', () => { isPainting = false; });
    
    // For touch devices
    canvas.addEventListener('touchstart', (e) => { isPainting = true; paint(e.touches[0]); e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { if (isPainting) paint(e.touches[0]); e.preventDefault(); }, {passive: false});
    window.addEventListener('touchend', () => { isPainting = false; });

    // 4. UI Actions
    document.getElementById('btnCreateBlank').onclick = () => {
      const w = parseInt(document.getElementById('newW').value, 10);
      const h = parseInt(document.getElementById('newH').value, 10);
      if (w > 0 && h > 0) {
        mapW = w;
        mapH = h;
        mapData = Array(h).fill().map(() => Array(w).fill(selectedTile));
        renderMap();
        statusMsg.innerText = `Created blank ${w}x${h} map.`;
      }
    };

    document.getElementById('btnLoad').onclick = () => {
      try {
        const text = ioBox.value.trim();
        if (!text) return;
        
        // Use Function to safely evaluate JS array format (deals with missing quotes better than JSON.parse)
        const parsed = new Function('return ' + text + ';')();
        
        if (Array.isArray(parsed) && Array.isArray(parsed[0])) {
          mapData = parsed;
          mapH = mapData.length;
          mapW = mapData[0].length;
          
          document.getElementById('newW').value = mapW;
          document.getElementById('newH').value = mapH;
          renderMap();
          statusMsg.innerText = `Loaded map: ${mapW}x${mapH} tiles.`;
        } else {
          throw new Error('Not a 2D array');
        }
      } catch (err) {
        alert('Failed to parse map array. Make sure it is a valid 2D array, e.g., [[0,1],[2,0]]\n\nError: ' + err.message);
      }
    };

    document.getElementById('btnExport').onclick = () => {
      if (!mapData || !mapData.length) return;
      
      let out = '[\n';
      for (let y = 0; y < mapH; y++) {
        out += '  [' + mapData[y].join(', ') + ']' + (y < mapH - 1 ? ',' : '') + '\n';
      }
      out += ']';
      ioBox.value = out;
      statusMsg.innerText = 'Array exported to text area. Ready to copy!';
    };

    const zoomCtrl = document.getElementById('zoomCtrl');
    const zoomLabel = document.getElementById('zoomLabel');
    zoomCtrl.addEventListener('input', (e) => {
      tileSize = parseInt(e.target.value, 10);
      zoomLabel.innerText = tileSize + 'px';
      renderMap();
    });

    // Initial blank render
    document.getElementById('btnCreateBlank').click();
  </script>
</body>
</html>
